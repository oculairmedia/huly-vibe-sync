[formula.code-review]
description = "Review a code change with a reviewer/coder/tester loop. The reviewer reads the diff and produces a verdict; the coder applies fixes if the verdict is not LGTM; the tester verifies the fix."

[[formula.code-review.steps]]
role = "reviewer"
prompt_template = "prompts/review.md"
wait_for = "completion"

[[formula.code-review.steps]]
role = "coder"
prompt_template = "prompts/fix.md"
depends_on = "reviewer"
wait_for = "completion"

[[formula.code-review.steps]]
role = "tester"
prompt_template = "prompts/verify.md"
depends_on = "coder"
