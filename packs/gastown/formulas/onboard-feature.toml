[formula.onboard-feature]
description = "Take a feature request from intent → spec → implementation → review → verification. Mayor decomposes the work, coder implements, reviewer signs off, tester verifies."

[[formula.onboard-feature.steps]]
role = "mayor"
prompt_template = "prompts/mayor-system.md"
wait_for = "completion"

[[formula.onboard-feature.steps]]
role = "coder"
prompt_template = "prompts/coder-system.md"
depends_on = "mayor"
wait_for = "completion"

[[formula.onboard-feature.steps]]
role = "reviewer"
prompt_template = "prompts/reviewer-system.md"
depends_on = "coder"
wait_for = "completion"

[[formula.onboard-feature.steps]]
role = "tester"
prompt_template = "prompts/tester-system.md"
depends_on = "reviewer"
wait_for = "completion"
