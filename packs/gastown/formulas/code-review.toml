[formula.code-review]
description = "Review a code change with a reviewer → coder → tester loop. The reviewer reads the diff and produces a verdict; the coder applies fixes if requested; the tester verifies the result. Each step blocks on the previous."

[[formula.code-review.steps]]
role = "reviewer"
prompt_template = "prompts/reviewer-system.md"
wait_for = "completion"

[[formula.code-review.steps]]
role = "coder"
prompt_template = "prompts/coder-system.md"
depends_on = "reviewer"
wait_for = "completion"

[[formula.code-review.steps]]
role = "tester"
prompt_template = "prompts/tester-system.md"
depends_on = "coder"
wait_for = "completion"
