services:
  vibe-sync:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vibe-sync
    restart: unless-stopped
    environment:
      # Vibe Kanban Configuration
      - VIBE_MCP_URL=${VIBE_MCP_URL:-http://192.168.50.90:9717/mcp}
      - VIBE_API_URL=${VIBE_API_URL:-http://192.168.50.90:3105/api}

      # Sync Configuration
      - SYNC_INTERVAL=${SYNC_INTERVAL:-10000} # 10 seconds default
      - INCREMENTAL_SYNC=false # Disabled for bidirectional sync - Phase 2 needs full issue list
      - PARALLEL_SYNC=${PARALLEL_SYNC:-false}
      - MAX_WORKERS=${MAX_WORKERS:-5}
      - SKIP_EMPTY_PROJECTS=false # Disabled to allow all projects to sync
      - DRY_RUN=${DRY_RUN:-false}

      # Stacks Directory
      - STACKS_DIR=${STACKS_DIR:-/opt/stacks}

      # Node Environment
      - NODE_ENV=production

    volumes:
      # Logs directory
      - ./logs:/app/logs

      # Access to stacks directory (read-write for state persistence)
      - /opt/stacks:/opt/stacks:rw

    network_mode: host

    healthcheck:
      test: ['CMD', 'node', '-e', 'process.exit(0)']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'
